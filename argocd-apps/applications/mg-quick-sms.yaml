apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mg-quick-sms
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/eshunemma/MG-QuickSMS-Server-Pro.git
    targetRevision: HEAD
    path: mg-quick-sms
    helm:
      valueFiles:
      - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: web-apps
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
