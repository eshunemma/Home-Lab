apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: wordpress-routes
  namespace: wordpress
spec:
  parentRefs: # Which Gateway and listener to attach to
    - name: gateway # Gateway name
      namespace: ngf-gatewayapi-ns
      sectionName: http # Listener name from Gateway spec
  hostnames:
    - "portfolio.eshundev.online"
  rules: # Routing rules
    - backendRefs:
        - name: wordpress # Service to send traffic to
          port: 80
