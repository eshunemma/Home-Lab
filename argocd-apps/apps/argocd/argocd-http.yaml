apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: argocd-routes
  namespace: argocd
spec:
  parentRefs: # Which Gateway and listener to attach to
    - name: gateway # Gateway name
      namespace: ngf-gatewayapi-ns
      sectionName: http # Listener name from Gateway spec
  hostnames:
    - "gitops.eshundev.online"
  rules: # Routing rules
    - backendRefs:
        - name: argocd-server # Service to send traffic to
          port: 31482
